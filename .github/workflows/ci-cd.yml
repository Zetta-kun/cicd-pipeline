name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE: zetta/cicd-pipeline
  DOCKER_TAG: latest

jobs:
  # ============================================
  # JOB 1: Test
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: pytest tests/ -v
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            .pytest_cache/
            __pycache__/

  # ============================================
  # JOB 2: Build Docker Image
  # ============================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ============ DEBUG ADDIMI ============
      - name: Debug Docker secrets
        run: |
          echo "========================================="
          echo "DEBUGGING DOCKER SECRETS"
          echo "========================================="
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "✅ DOCKER_USERNAME is set"
            echo "   Length: ${{ secrets.DOCKER_USERNAME | length }}"
            echo "   Value: ${{ secrets.DOCKER_USERNAME }}"
          else
            echo "❌ DOCKER_USERNAME is NOT set"
          fi
          
          if [ -n "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "✅ DOCKER_TOKEN is set"
            echo "   Length: ${{ secrets.DOCKER_TOKEN | length }}"
            # Token-in tam dəyərini göstərməyin (təhlükəsizlik)
            echo "   First 10 chars: ${{ secrets.DOCKER_TOKEN | truncate(10) }}..."
          else
            echo "❌ DOCKER_TOKEN is NOT set"
          fi
          echo "========================================="
      # ============ DEBUG BITDI ============
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: Deploy (simulated)
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy notification
        run: |
          echo "========================================="
          echo "DEPLOYMENT SIMULATED"
          echo "========================================="
          echo "Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo "To deploy for real, add:"
          echo "  - scp to server"
          echo "  - ssh commands"
          echo "  - kubectl apply"
          echo "  - etc."
          echo "========================================="
      
      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Successful" >> $GITHUB_STEP_SUMMARY